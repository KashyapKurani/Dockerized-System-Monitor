services:

  mysql:
    image: mysql:8.4

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: monitor_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build: ./app

    container_name: monitor-app

    restart: always

    ports:
      - "5000:5000"

    environment:
      APP_VERSION: 2.0.0
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: monitor_db

    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: